<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to critical domains for faster loading -->
    <link rel="preconnect" href="https://sjghitoydzpirpqjules.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch for third-party domains -->
    <link rel="dns-prefetch" href="https://sjghitoydzpirpqjules.supabase.co" />
    
    <!-- Critical CSS will be inlined by Vite -->
    <title>NESA-Africa | New Education Standard Award</title>
    <meta name="description" content="NESA-Africa celebrates changemakers shaping the future of education across Africa. Nominate educators, vote for excellence, and support education transformation." />
    <meta name="author" content="NESA-Africa" />
    <meta name="theme-color" content="#1a1a2e" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="NESA-Africa | New Education Standard Award" />
    <meta property="og:description" content="Celebrating changemakers shaping the future of education across Africa" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nesa.africa" />
    <meta property="og:image" content="https://nesa.africa/og-image.png" />
    <meta property="og:site_name" content="NESA-Africa" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NESAAfrica" />
    <meta name="twitter:title" content="NESA-Africa | New Education Standard Award" />
    <meta name="twitter:description" content="Celebrating changemakers shaping the future of education across Africa" />
    <meta name="twitter:image" content="https://nesa.africa/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Performance hints -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    
    <!-- Inline critical styles to prevent FOUC -->
    <style>
      /* Critical CSS for above-the-fold content */
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;line-height:1.5}
      body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#1a1a2e;color:#fff}
      #root{min-height:100vh}
      /* Loading spinner */
      .initial-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1a1a2e}
      .initial-loader svg{animation:spin 1s linear infinite;width:2rem;height:2rem;color:#d4af37}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Initial loading state shown before React hydrates -->
      <div class="initial-loader" id="initial-loader">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="31.416" stroke-dashoffset="10" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    
    <!-- Remove initial loader once app is ready -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(function() {
            loader.style.transition = 'opacity 0.2s ease';
            loader.style.opacity = '0';
            setTimeout(function() { loader.remove(); }, 200);
          }, 100);
        }
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
